openapi: 3.0.3
info:
  title: KafkaSSE API
  description: Kafka Consumer to HTTP SSE/EventSource. Streams JSON messages from Kafka topics to clients over HTTP in SSE format.
  version: 0.5.0
paths:
  /v1/streams:
    get:
      summary: List available streams (Kafka topics)
      description: |
        Returns a list of available Kafka topics that can be streamed.
      operationId: listStreams
      responses:
        '200':
          description: List of streams
          content:
            application/json:
              schema:
                type: object
                properties:
                  streams:
                    type: array
                    items:
                      type: string
                    example: ["topic1", "topic2"]
  /v1/stream/{streams}:
    get:
      summary: Stream Kafka messages as SSE
      description: |
        Connects to Kafka and streams messages from the specified topics as Server-Sent Events.
      operationId: streamTopicsV1
      parameters:
        - name: streams
          in: path
          required: true
          description: Comma-separated list of Kafka topics
          schema:
            type: string
          example: topic1,topic2
        - name: partition
          in: query
          required: false
          description: Kafka partition number
          schema:
            type: integer
          example: 0
        - name: offset
          in: query
          required: false
          description: Kafka offset number (omit to start at latest)
          schema:
            type: integer
          example: 0
        - name: timestamp
          in: query
          required: false
          description: Start at Kafka offset for this timestamp (milliseconds since epoch). Overrides offset.
          schema:
            type: integer
          example: 1704067200000
      responses:
        '200':
          description: SSE stream of Kafka messages
          content:
            text/event-stream:
              schema:
                type: string
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '500':
          description: Server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
  /spec:
    get:
      summary: Get OpenAPI specification
      responses:
        '200':
          description: OpenAPI spec in YAML format
          content:
            application/yaml:
              schema:
                type: string
  /:
    get:
      summary: Redirect to API documentation
      responses:
        '302':
          description: Redirect to /docs
          headers:
            Location:
              schema:
                type: string
              example: /docs
